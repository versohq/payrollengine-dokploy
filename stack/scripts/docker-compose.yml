services:
  mysql:
    image: mysql:8.0
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=caching_sha2_password
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?required}
      MYSQL_DATABASE: PayrollEngine
    volumes:
      - mysql-data:/var/lib/mysql
      - ./stack/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 120s
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        PE_VERSION: ${PE_VERSION:-0.10.0-beta.4}
        PE_BACKEND_REF: ${PE_BACKEND_REF:-v0.10.0-beta.4}
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__PayrollDatabaseConnection: "Server=mysql;Port=3306;Database=PayrollEngine;User=root;Password=${MYSQL_ROOT_PASSWORD};CharSet=utf8mb4;SslMode=None;AllowPublicKeyRetrieval=True;"
      PayrollServerConfiguration__DbProvider: MySql
      PayrollServerConfiguration__DbCollation: utf8mb4_unicode_ci
      PayrollServerConfiguration__EnableSwagger: "true"
      Authentication__Mode: ApiKey
      Authentication__ApiKey: ${PAYROLL_API_KEY:?required}
    networks:
      - default
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      - "traefik.http.routers.${STACK_NAME:-payroll}-backend.rule=Host(`${STACK_HOST:-payroll.localhost}`)"
      - "traefik.http.routers.${STACK_NAME:-payroll}-backend.entrypoints=websecure"
      - "traefik.http.routers.${STACK_NAME:-payroll}-backend.tls.certresolver=letsencrypt"
      - "traefik.http.services.${STACK_NAME:-payroll}-backend.loadbalancer.server.port=8080"
    restart: unless-stopped

volumes:
  mysql-data:

networks:
  default:
  dokploy-network:
    external: true
