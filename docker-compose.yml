services:
  mysql:
    image: mysql:8.0
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=caching_sha2_password
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?required}
      MYSQL_DATABASE: PayrollEngine
    volumes:
      - mysql-data:/var/lib/mysql
      - ./stack/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 120s
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        PE_VERSION: ${PE_VERSION:-0.10.0-beta.4}
        PE_BACKEND_REF: ${PE_BACKEND_REF:-v0.10.0-beta.4}
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__PayrollDatabaseConnection: "Server=mysql;Port=3306;Database=PayrollEngine;User=root;Password=${MYSQL_ROOT_PASSWORD};CharSet=utf8mb4;SslMode=None;AllowPublicKeyRetrieval=True;"
      PayrollServerConfiguration__DbProvider: MySql
      PayrollServerConfiguration__DbCollation: utf8mb4_unicode_ci
      PayrollServerConfiguration__EnableSwagger: "true"
      Authentication__Mode: ApiKey
      Authentication__ApiKey: ${PAYROLL_API_KEY:?required}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    networks:
      - default
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      - "traefik.http.routers.${STACK_NAME:-payroll}-backend.rule=Host(`${STACK_HOST:-payroll.localhost}`)"
      - "traefik.http.routers.${STACK_NAME:-payroll}-backend.entrypoints=websecure"
      - "traefik.http.routers.${STACK_NAME:-payroll}-backend.tls.certresolver=letsencrypt"
      - "traefik.http.services.${STACK_NAME:-payroll}-backend.loadbalancer.server.port=8080"
    restart: unless-stopped

  regulation-import:
    build:
      context: .
      dockerfile: Dockerfile.console
      args:
        PE_VERSION: ${PE_VERSION:-0.10.0-beta.4}
        PE_CONSOLE_REF: ${PE_CONSOLE_REF:-main}
    depends_on:
      backend:
        condition: service_started
    environment:
      REGULATION_REPO_URL: ${REGULATION_REPO_URL:-}
      REGULATION_REPO_TOKEN: ${REGULATION_REPO_TOKEN:-}
      REGULATION_ENTRY_FILE: ${REGULATION_ENTRY_FILE:-}
      PayrollApiConnection: "BaseUrl=http://backend;Port=8080;Timeout=00:05:00;ApiKey=${PAYROLL_API_KEY}"
    volumes:
      - regulation-data:/regulation
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        if [ -z "$${REGULATION_REPO_URL}" ]; then
          echo "REGULATION_REPO_URL not set — skipping import"
          exit 0
        fi
        echo "[1/3] cloning $${REGULATION_REPO_URL}"
        rm -rf /regulation/current
        CLONE_URL="$${REGULATION_REPO_URL}"
        if [ -n "$${REGULATION_REPO_TOKEN}" ]; then
          CLONE_URL=$$(echo "$${REGULATION_REPO_URL}" | sed "s|https://|https://x-access-token:$${REGULATION_REPO_TOKEN}@|")
        fi
        git clone --depth 1 "$${CLONE_URL}" /regulation/current
        echo "[2/3] waiting for backend..."
        for i in $$(seq 1 60); do
          if curl -sf http://backend:8080/swagger/index.html >/dev/null 2>&1; then
            echo "backend ready"
            break
          fi
          sleep 5
        done
        ENTRY=""
        if [ -n "$${REGULATION_ENTRY_FILE}" ]; then
          ENTRY="/regulation/current/$${REGULATION_ENTRY_FILE}"
        else
          ENTRY=$$(find /regulation/current -maxdepth 3 -name 'Setup.pecmd' | sort | grep -v '/Data\.' | head -1)
          if [ -z "$${ENTRY}" ]; then
            ENTRY=$$(find /regulation/current -maxdepth 3 -name 'Setup.pecmd' | sort | head -1)
          fi
          if [ -z "$${ENTRY}" ]; then
            ENTRY=$$(find /regulation/current -maxdepth 2 -name '*.json' | sort | head -1)
          fi
        fi
        if [ -z "$${ENTRY}" ] || [ ! -f "$${ENTRY}" ]; then
          echo "ERROR: no entry file found (Setup.pecmd or *.json)"
          find /regulation/current -maxdepth 3 -type f | head -20
          exit 1
        fi
        echo "[3/3] importing $${ENTRY}"
        cd "$$(dirname "$${ENTRY}")"
        NAME=$$(basename "$${ENTRY}")
        case "$${NAME}" in
          *.pecmd)
            dotnet /app/PayrollEngine.PayrollConsole.dll "$${NAME}"
            ;;
          *)
            dotnet /app/PayrollEngine.PayrollConsole.dll PayrollImport "SourceFileName:$${NAME}" /bulk
            ;;
        esac
        echo "regulation import done"
    restart: "no"

volumes:
  mysql-data:
  regulation-data:

networks:
  default:
  dokploy-network:
    external: true
