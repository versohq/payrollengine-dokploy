services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${DB_PASSWORD}"
      MSSQL_PID: "Developer"
    volumes:
      - mssql-data:/var/opt/mssql
    restart: unless-stopped

  db-init:
    build:
      context: ./db-init
      dockerfile: Dockerfile
    platform: linux/amd64
    depends_on:
      - db
    environment:
      DB_PASSWORD: "${DB_PASSWORD}"
      SQL_SOURCE_URL: "${SQL_SOURCE_URL:-https://raw.githubusercontent.com/Payroll-Engine/PayrollEngine.Backend/main/Database/ModelCreate.sql}"

  backend-api:
    build:
      context: https://github.com/Payroll-Engine/PayrollEngine.Backend.git
      dockerfile: Dockerfile
    platform: linux/amd64
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      ASPNETCORE_ENVIRONMENT: "${ASPNETCORE_ENVIRONMENT:-Production}"
      ConnectionStrings__PayrollDatabaseConnection: "Server=db;Database=PayrollEngine;User Id=sa;Password=${DB_PASSWORD};TrustServerCertificate=True;"
    depends_on:
      db-init:
        condition: service_completed_successfully
    restart: unless-stopped

  webapp:
    build:
      context: https://github.com/Payroll-Engine/PayrollEngine.WebApp.git
      dockerfile: Dockerfile
    platform: linux/amd64
    ports:
      - "${WEBAPP_PORT:-8081}:8080"
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      ASPNETCORE_ENVIRONMENT: "${ASPNETCORE_ENVIRONMENT:-Production}"
      ApiSettings__BaseUrl: "http://backend-api:8080"
    depends_on:
      - backend-api
    restart: unless-stopped

volumes:
  mssql-data:
